version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 3
    groups:
      development-dependencies:
        dependency-type: development
        patterns:
          - "@types/*"
          - "typescript"
          - "vitest"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 1
