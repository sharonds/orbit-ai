name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Changesets/action v1 opens its version PR from a same-repo branch named
      # `changeset-release/main`. Keep the repo+actor checks so fork branches
      # with the same name cannot bypass this guard.
      - name: Verify no manual package.json version bumps on non-release commits
        if: ${{ github.event_name == 'pull_request' && !(github.head_ref == 'changeset-release/main' && github.event.pull_request.head.repo.full_name == github.repository && github.actor == 'github-actions[bot]') }}
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff origin/${{ github.base_ref }}...HEAD -- 'packages/*/package.json' | grep -E '^\+\s*"version":' ; then
            echo "ERROR: PRs must not manually bump package.json version fields."
            echo "Add a changeset instead: pnpm changeset"
            exit 1
          fi

      - name: Setup pnpm
        # Version is derived from the `packageManager` field in package.json
        # (single source of truth for Corepack + CI). Do NOT add `with: version`
        # here — pnpm/action-setup@v4 refuses when both are specified.
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test release workflow
        run: pnpm test:release-workflow

      - name: Test
        run: pnpm -r test

      - name: Run quickstart example (smoke)
        run: |
          if [ -d "examples/nodejs-quickstart" ]; then
            cd examples/nodejs-quickstart
            if [ -f package.json ] && grep -q '"start"' package.json; then
              pnpm start
            fi
          fi

  journeys:
    name: E2E launch journeys
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    env:
      ORBIT_CREDENTIAL_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Run all 14 E2E journeys (SQLite)
        run: pnpm -F @orbit-ai/e2e test
