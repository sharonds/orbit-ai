name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Changesets/action v1 opens its version PR from a branch named
      # `changeset-release/main` (verified against changesets/action source).
      # If that branch name changes in a future major, update this guard.
      - name: Verify no manual package.json version bumps on non-release commits
        if: ${{ github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main' }}
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff origin/${{ github.base_ref }}...HEAD -- 'packages/*/package.json' | grep -E '^\+\s*"version":' ; then
            echo "ERROR: PRs must not manually bump package.json version fields."
            echo "Add a changeset instead: pnpm changeset"
            exit 1
          fi

      - name: Setup pnpm
        # Version is derived from the `packageManager` field in package.json
        # (single source of truth for Corepack + CI). Do NOT add `with: version`
        # here — pnpm/action-setup@v4 refuses when both are specified.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Run quickstart example (smoke)
        run: |
          if [ -d "examples/nodejs-quickstart" ]; then
            cd examples/nodejs-quickstart
            if [ -f package.json ] && grep -q '"start"' package.json; then
              pnpm start
            fi
          fi
