name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      run_sqlite_e2e: ${{ steps.e2e-scope.outputs.run_sqlite_e2e }}
      run_postgres_e2e: ${{ steps.e2e-scope.outputs.run_postgres_e2e }}

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine E2E scope
        id: e2e-scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_sqlite_e2e=true" >> "$GITHUB_OUTPUT"
            echo "run_postgres_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(packages/(core|api|sdk|cli|mcp|integrations)/src/|e2e/|examples/nodejs-quickstart/)'; then
            echo "run_sqlite_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_sqlite_e2e=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed_files" | grep -E '^(packages/(core|api|sdk)/src/|e2e/src/(harness|journeys/(02|03|04|05|06|07|08|09|10|11))/)'; then
            echo "run_postgres_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_postgres_e2e=false" >> "$GITHUB_OUTPUT"
          fi

      # Changesets/action v1 opens its version PR from a same-repo branch named
      # `changeset-release/main`. Keep the repo+actor checks so fork branches
      # with the same name cannot bypass this guard.
      - name: Verify no manual package.json version bumps on non-release commits
        if: ${{ github.event_name == 'pull_request' && !(github.head_ref == 'changeset-release/main' && github.event.pull_request.head.repo.full_name == github.repository && github.actor == 'github-actions[bot]') }}
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff origin/${{ github.base_ref }}...HEAD -- 'packages/*/package.json' | grep -E '^\+\s*"version":' ; then
            echo "ERROR: PRs must not manually bump package.json version fields."
            echo "Add a changeset instead: pnpm changeset"
            exit 1
          fi

      - name: Setup pnpm
        # Version is derived from the `packageManager` field in package.json
        # (single source of truth for Corepack + CI). Do NOT add `with: version`
        # here — pnpm/action-setup@v4 refuses when both are specified.
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test release workflow
        run: pnpm test:release-workflow

      - name: Test
        run: pnpm -r --filter '!@orbit-ai/e2e' test

      - name: Run quickstart example (smoke)
        run: |
          if [ -d "examples/nodejs-quickstart" ]; then
            cd examples/nodejs-quickstart
            if [ -f package.json ] && grep -q '"start"' package.json; then
              pnpm start
            fi
          fi

  journeys:
    name: E2E launch journeys
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ needs.verify.outputs.run_sqlite_e2e == 'true' }}
    timeout-minutes: 20
    env:
      ORBIT_CREDENTIAL_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Run all 14 E2E journeys (SQLite)
        run: pnpm -F @orbit-ai/e2e test

  journeys-postgres:
    name: E2E journeys (Postgres subset)
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ needs.verify.outputs.run_postgres_e2e == 'true' }}
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orbit_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/orbit_e2e
      ORBIT_E2E_ADAPTER: postgres
    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Run journeys 2-11 against Postgres
        run: pnpm -F @orbit-ai/e2e test src/journeys/02 src/journeys/03 src/journeys/04 src/journeys/05 src/journeys/06 src/journeys/07 src/journeys/08 src/journeys/09 src/journeys/10 src/journeys/11
