name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is derived from the `packageManager` field in package.json
        # (single source of truth for Corepack + CI). Do NOT add `with: version`
        # here — pnpm/action-setup@v4 refuses when both are specified.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Run quickstart example (smoke)
        run: |
          if [ -d "examples/nodejs-quickstart" ]; then
            cd examples/nodejs-quickstart
            if [ -f package.json ] && grep -q '"start"' package.json; then
              pnpm start
            fi
          fi
