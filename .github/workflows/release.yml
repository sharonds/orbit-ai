name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Upload built package artifacts
        # Pinned from actions/upload-artifact v4.6.2.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: package-dist
          path: packages/*/dist
          if-no-files-found: error

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm -r lint

  version:
    name: Version packages
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    if: "${{ contains(github.event.head_commit.message, 'chore(release): version packages') == false }}"
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release pull request
        # Pinned from changesets/action v1.7.0.
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          version: pnpm changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    if: "${{ contains(github.event.head_commit.message, 'chore(release): version packages') && github.event.head_commit.author.username == 'github-actions[bot]' }}"
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download built package artifacts
        # Pinned from actions/download-artifact v4.3.0.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: package-dist
          path: packages

      - name: Publish packages
        # Pinned from changesets/action v1.7.0.
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action uses NPM_TOKEN for npm authentication when publishing.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm reads NODE_AUTH_TOKEN for the configured registry-url.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Build happens before credentials are exposed; publish should not run lifecycle scripts.
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          # OIDC id-token permission above enables npm provenance attestations.
          NPM_CONFIG_PROVENANCE: "true"
