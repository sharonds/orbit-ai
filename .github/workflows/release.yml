name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm -r build

      - name: Upload built package artifacts
        # Pinned from actions/upload-artifact v4.6.2.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: package-dist
          path: packages/*/dist
          if-no-files-found: error

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test release workflow
        run: pnpm test:release-workflow

      - name: Test
        run: pnpm -r --filter '!@orbit-ai/e2e' test

      - name: Lint
        run: pnpm -r lint

  detect_release_pr_merge:
    name: Detect release PR merge
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_release_pr_merge: ${{ steps.detect.outputs.is_release_pr_merge }}
      release_pr_number: ${{ steps.detect.outputs.release_pr_number }}

    steps:
      - name: Detect generated release pull request
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq "map(select(.base.ref == \"main\" and .head.ref == \"changeset-release/main\" and .head.repo.full_name == \"${GITHUB_REPOSITORY}\" and .user.login == \"github-actions[bot]\" and .merged_at != null)) | if length == 1 then .[0].number else empty end"
          )"

          if [ -n "$pr_number" ]; then
            echo "is_release_pr_merge=true" >> "$GITHUB_OUTPUT"
            echo "release_pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_pr_merge=false" >> "$GITHUB_OUTPUT"
            echo "release_pr_number=" >> "$GITHUB_OUTPUT"
          fi

  version:
    name: Version packages
    runs-on: ubuntu-latest
    needs:
      - validate
      - detect_release_pr_merge
    timeout-minutes: 20
    if: "${{ needs.detect_release_pr_merge.outputs.is_release_pr_merge != 'true' }}"
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create or update release pull request
        # Pinned from changesets/action v1.7.0.
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          version: pnpm changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs:
      - validate
      - detect_release_pr_merge
    timeout-minutes: 20
    if: "${{ needs.detect_release_pr_merge.outputs.is_release_pr_merge == 'true' }}"
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout
        # Pinned from actions/checkout v4.3.1.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify generated release pull request provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR_NUMBER: ${{ needs.detect_release_pr_merge.outputs.release_pr_number }}
        run: |
          set -o pipefail

          if [ -z "$RELEASE_PR_NUMBER" ]; then
            echo "ERROR: refusing to publish because this commit is not from the generated Changesets release PR."
            exit 1
          fi

          release_pr_files="$(
            gh api \
              --paginate \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/pulls/${RELEASE_PR_NUMBER}/files" \
              --jq '.[].filename'
          )"

          invalid_files=""
          package_version_files=0
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            if [[ "$file" =~ ^packages/[^/]+/package\.json$ ]]; then
              package_version_files=$((package_version_files + 1))
              continue
            fi

            if [[ "$file" =~ ^(CHANGELOG\.md|pnpm-lock\.yaml|\.changeset/pre\.json|\.changeset/[^/]+\.md|packages/[^/]+/CHANGELOG\.md)$ ]]; then
              continue
            fi

            invalid_files+="${file}"$'\n'
          done <<< "$release_pr_files"
          if [ -n "$invalid_files" ]; then
            echo "ERROR: refusing to publish because the generated release PR changed unexpected files:"
            printf '%s\n' "$invalid_files"
            exit 1
          fi

          if [ "$package_version_files" -eq 0 ]; then
            echo "ERROR: refusing to publish because the generated release PR did not update any package version manifests."
            exit 1
          fi

      - name: Setup pnpm
        # Pinned from pnpm/action-setup v4.4.0.
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          version: 9.12.3

      - name: Setup Node.js
        # Pinned from actions/setup-node v4.4.0.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download built package artifacts
        # Pinned from actions/download-artifact v4.3.0.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: package-dist
          path: packages

      - name: Verify package artifacts
        run: node scripts/verify-package-artifacts.mjs

      - name: Publish packages
        # Pinned from changesets/action v1.7.0.
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action uses NPM_TOKEN for npm authentication when publishing.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm reads NODE_AUTH_TOKEN for the configured registry-url.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Build happens before credentials are exposed; publish should not run lifecycle scripts.
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          # OIDC id-token permission above enables npm provenance attestations.
          NPM_CONFIG_PROVENANCE: "true"
